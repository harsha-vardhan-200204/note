<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cloud Notes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #eef2ff;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --text: #111827;
  --muted: #6b7280;
  --border: rgba(15, 23, 42, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
  color: var(--text);
  min-height: 100vh;
  margin: 0;
  padding: 24px;
}

.page {
  max-width: 820px;
  margin: 0 auto;
}

header {
  margin-bottom: 24px;
}

h1 {
  margin: 0 0 10px;
  font-size: clamp(2rem, 2.5vw, 2.8rem);
}

p.subtitle {
  margin: 0;
  color: var(--muted);
}

.top-bar {
  display: grid;
  gap: 12px;
  grid-template-columns: 1fr auto;
  align-items: center;
  margin-bottom: 18px;
}

.top-bar input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  background: #fff;
  font-size: 0.95rem;
}

.stats {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  color: var(--muted);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
  padding: 22px;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 140px;
  resize: vertical;
  padding: 16px;
  border-radius: 18px;
  border: 1px solid var(--border);
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 14px;
}

.file-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 14px;
}

.file-row label,
.file-row button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  padding: 12px 16px;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
}

.file-row label:hover,
.file-row button:hover {
  transform: translateY(-1px);
  border-color: rgba(37, 99, 235, 0.3);
}

.file-row input[type="file"] {
  display: none;
}

.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 10px;
}

button.primary {
  background: var(--primary);
  color: white;
  border: none;
}

button.secondary {
  background: #f8fafc;
  color: var(--text);
  border: 1px solid var(--border);
}

button.secondary:hover {
  background: #eef2ff;
}

button.primary:hover {
  background: var(--primary-dark);
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.preview {
  border-radius: 18px;
  padding: 14px;
  border: 1px dashed var(--border);
  background: #f8fafc;
  color: var(--muted);
  display: none;
  gap: 12px;
  align-items: center;
}

.preview img {
  max-width: 96px;
  max-height: 96px;
  object-fit: cover;
  border-radius: 14px;
  border: 1px solid rgba(15, 23, 42, 0.06);
}

.notes-grid {
  display: grid;
  gap: 18px;
}

.note {
  padding: 18px;
  border-radius: 24px;
  background: #fff;
  border: 1px solid var(--border);
  box-shadow: 0 14px 32px rgba(15, 23, 42, 0.06);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.note:hover {
  transform: translateY(-2px);
  box-shadow: 0 20px 38px rgba(15, 23, 42, 0.12);
}

.note p {
  margin: 0;
  white-space: pre-wrap;
  line-height: 1.7;
}

.note-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  color: var(--muted);
  font-size: 0.95rem;
}

.note img {
  width: 100%;
  margin-top: 14px;
  border-radius: 18px;
  object-fit: cover;
}

.note .card-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}

@media (max-width: 640px) {
  .top-bar {
    grid-template-columns: 1fr;
  }
  .file-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="page">
  <header>
    <h1>ChartBox</h1>
    <p class="subtitle">Write, preview, search, edit, and store your notes with image support.</p>
  </header>

  <div class="top-bar">
    <input id="searchInput" type="search" placeholder="Search notes..." />
    <div class="stats">
      <span id="noteCount">0 notes</span>
      <span id="message" aria-live="polite"></span>
    </div>
  </div>

  <section class="card">
    <textarea id="noteInput" placeholder="Write note..."></textarea>

    <div class="file-row">
      <label for="imageInput">📷 Choose image</label>
      <button type="button" class="secondary" id="clearImageButton">Clear image</button>
    </div>
    <input type="file" id="imageInput" accept="image/*">

    <div class="preview" id="imagePreview">
      <img alt="Selected preview" id="previewThumb" src="" />
      <div>
        <p><strong>Image selected</strong></p>
        <p id="previewName"></p>
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="saveButton" onclick="saveNote()">Save Note</button>
      <button class="secondary" type="button" onclick="resetForm()">Reset</button>
    </div>
  </section>

  <section class="notes-grid" id="notesList"></section>
</div>

<script>
const SUPABASE_URL = "https://kuengnoohosovnnibqlb.supabase.co";
const SUPABASE_KEY = "sb_publishable_y4XzOOhE84fof3YZK4qz-w_KSCMXLlz";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const noteInput = document.getElementById('noteInput');
const imageInput = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
const previewThumb = document.getElementById('previewThumb');
const previewName = document.getElementById('previewName');
const notesList = document.getElementById('notesList');
const noteCount = document.getElementById('noteCount');
const searchInput = document.getElementById('searchInput');
const saveButton = document.getElementById('saveButton');
const message = document.getElementById('message');
const clearImageButton = document.getElementById('clearImageButton');

let editingNoteId = null;
let allNotes = [];

imageInput.addEventListener('change', handleImagePreview);
searchInput.addEventListener('input', () => renderNotes(allNotes));
clearImageButton.addEventListener('click', clearImageSelection);
noteInput.addEventListener('input', updateSaveButtonState);

function showMessage(text, timeout = 2500) {
  message.textContent = text;
  if (timeout > 0) {
    setTimeout(() => {
      if (message.textContent === text) message.textContent = '';
    }, timeout);
  }
}

function updateSaveButtonState() {
  const hasText = noteInput.value.trim().length > 0;
  const hasImage = imageInput.files.length > 0;
  saveButton.disabled = !hasText && !hasImage;
}

function handleImagePreview() {
  const file = imageInput.files[0];
  if (!file) {
    imagePreview.style.display = 'none';
    return;
  }

  const objectUrl = URL.createObjectURL(file);
  previewThumb.src = objectUrl;
  previewName.textContent = file.name;
  imagePreview.style.display = 'grid';
  updateSaveButtonState();
}

function clearImageSelection() {
  imageInput.value = '';
  imagePreview.style.display = 'none';
  previewThumb.src = '';
  previewName.textContent = '';
  updateSaveButtonState();
}

function resetForm() {
  editingNoteId = null;
  noteInput.value = '';
  clearImageSelection();
  saveButton.textContent = 'Save Note';
  showMessage('Ready for a new note');
  updateSaveButtonState();
}

async function saveNote() {
  const text = noteInput.value.trim();
  const file = imageInput.files[0];
  let imageUrl = '';

  if (!text && !file) {
    alert('Please add text or select an image.');
    return;
  }

  if (file) {
    const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
    const { error: uploadError } = await db.storage
      .from('note-images')
      .upload(fileName, file);

    if (uploadError) {
      console.error('Upload error:', uploadError);
      alert('Image upload failed. Please try again.');
      return;
    }

    imageUrl = `${SUPABASE_URL}/storage/v1/object/public/note-images/${encodeURIComponent(fileName)}`;
  }

  if (editingNoteId) {
    const { error } = await db
      .from('notes')
      .update({
        content: text,
        image_url: imageUrl || null
      })
      .eq('id', editingNoteId);

    if (error) {
      console.error('Update error:', error);
      alert('Unable to update note.');
      return;
    }

    showMessage('Note updated');
  } else {
    const { error } = await db
      .from('notes')
      .insert([{ content: text, image_url: imageUrl }]);

    if (error) {
      console.error('Insert error:', error);
      alert('Unable to save note.');
      return;
    }

    showMessage('Note saved');
  }

  resetForm();
  await loadNotes();
}

async function deleteNote(id) {
  const confirmed = confirm('Delete this note permanently?');
  if (!confirmed) return;

  const { error } = await db
    .from('notes')
    .delete()
    .eq('id', id);

  if (error) {
    console.error('Delete error:', error);
    alert('Unable to delete note.');
    return;
  }

  showMessage('Note deleted');
  await loadNotes();
}

function editNote(note) {
  editingNoteId = note.id;
  noteInput.value = note.content || '';
  saveButton.textContent = 'Update Note';

  if (note.image_url) {
    previewThumb.src = note.image_url;
    previewName.textContent = note.image_url.split('/').pop();
    imagePreview.style.display = 'grid';
  } else {
    clearImageSelection();
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateSaveButtonState();
}

function formatDate(value) {
  if (!value) return '';
  const date = new Date(value);
  return date.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

function renderNotes(notes) {
  const query = searchInput.value.trim().toLowerCase();
  const visibleNotes = notes.filter(note => {
    if (!query) return true;
    return (note.content || '').toLowerCase().includes(query);
  });

  noteCount.textContent = `${visibleNotes.length} note${visibleNotes.length === 1 ? '' : 's'}`;
  notesList.innerHTML = '';

  if (visibleNotes.length === 0) {
    notesList.innerHTML = '<div class="note"><p>No notes found. Add one above to get started.</p></div>';
    return;
  }

  visibleNotes.forEach(note => {
    const noteElement = document.createElement('article');
    noteElement.className = 'note';

    const contentParagraph = document.createElement('p');
    contentParagraph.textContent = note.content || 'No text provided';
    noteElement.appendChild(contentParagraph);

    if (note.image_url) {
      const imageElement = document.createElement('img');
      imageElement.src = note.image_url;
      imageElement.alt = 'Note image';
      noteElement.appendChild(imageElement);
    }

    const metaRow = document.createElement('div');
    metaRow.className = 'note-meta';
    metaRow.innerHTML = `
      <span>${formatDate(note.created_at)}</span>
      <span>#${note.id}</span>
    `;
    noteElement.appendChild(metaRow);

    const actionsRow = document.createElement('div');
    actionsRow.className = 'card-actions';

    const editButton = document.createElement('button');
    editButton.type = 'button';
    editButton.className = 'secondary';
    editButton.textContent = 'Edit';
    editButton.addEventListener('click', () => editNote(note));

    const deleteButton = document.createElement('button');
    deleteButton.type = 'button';
    deleteButton.className = 'primary';
    deleteButton.textContent = 'Delete';
    deleteButton.addEventListener('click', () => deleteNote(note.id));

    actionsRow.appendChild(editButton);
    actionsRow.appendChild(deleteButton);
    noteElement.appendChild(actionsRow);

    notesList.appendChild(noteElement);
  });
}

async function loadNotes() {
  const { data, error } = await db
    .from('notes')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  allNotes = data || [];
  renderNotes(allNotes);
}

resetForm();
loadNotes();
</script>
</body>
</html>
