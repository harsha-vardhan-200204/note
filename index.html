<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cloud Notes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
background:#f3f4f6;
}
textarea{
width:100%;
height:140px;
padding:15px;
font-size:16px;
border-radius:12px;
}
button{
margin-top:10px;
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
.note{
background:white;
padding:15px;
margin-top:12px;
border-radius:12px;
white-space:pre-wrap;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}
</style>
</head>
<body>

<h1>📝 My Cloud Notes</h1>

<textarea id="noteInput" placeholder="Write note..."></textarea>
<button onclick="saveNote()">Save Note</button>

<div id="notesList"></div>

<script>
const SUPABASE_URL = "https://kuengnoohosovnnibqlb.supabase.co";
const SUPABASE_KEY = "sb_publishable_y4XzOOhE84fof3YZK4qz-w_KSCMXLlz";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

async function saveNote() {
  const text = document.getElementById("noteInput").value.trim();

  if (!text) return;

  const { error } = await db
    .from("notes")
    .insert([{ content: text }]);

  if (error) {
    alert(error.message);
    console.log(error);
    return;
  }

  document.getElementById("noteInput").value = "";
  loadNotes();
}

async function deleteNote(id) {
  const { error } = await db
    .from("notes")
    .delete()
    .eq("id", id);

  if (error) {
    alert(error.message);
    console.log(error);
    return;
  }

  loadNotes();
}

async function loadNotes() {
  const { data, error } = await db
    .from("notes")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const notesList = document.getElementById("notesList");
  notesList.innerHTML = "";

  data.forEach(note => {
    notesList.innerHTML += `
      <div class="note">
        ${note.content}
        <br><br>
        <button onclick="deleteNote(${note.id})">Delete</button>
      </div>
    `;
  });
}

loadNotes();
</script>

</body>
</html>
