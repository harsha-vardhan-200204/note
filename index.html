<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChartBox - Interactive Digital Notes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #071126;
      --bg-gradient: linear-gradient(135deg, #071126 0%, #030814 100%);
      --card-bg: rgba(13, 27, 54, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 16px 36px rgba(0, 0, 0, 0.5);
      --text-primary: #f3f4f6;
      --text-muted: #94a3b8;
      --primary: #0077f2;
      --primary-hover: #0056b3;
      --primary-glow: rgba(0, 119, 242, 0.25);
      --accent: #f59e0b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border-radius-lg: 24px;
      --border-radius-md: 16px;
      --border-radius-sm: 10px;
    }

    [data-theme="light"] {
      --bg: #eef4ff;
      --bg-gradient: linear-gradient(135deg, #eef4ff 0%, #dbeafe 100%);
      --card-bg: rgba(255, 255, 255, 0.78);
      --card-border: rgba(0, 59, 122, 0.1);
      --card-shadow: 0 16px 36px rgba(0, 59, 122, 0.08);
      --text-primary: #00224b;
      --text-muted: #4b6b94;
      --primary: #0056b3;
      --primary-hover: #003b7a;
      --primary-glow: rgba(0, 86, 179, 0.2);
      --accent: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 30px 20px;
      overflow-x: hidden;
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      outline: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    .app-page {
      display: none;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.88);
    }

    .login-box {
      width: min(100%, 380px);
      padding: 30px;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #003b7a;
      text-align: center;
      font-family: "Outfit", sans-serif;
    }

    .login-box input {
      width: 100%;
      margin-bottom: 12px;
      padding: 14px;
      border: 1px solid #d8dee8;
      border-radius: 10px;
      color: #0f172a;
    }

    .login-box button {
      width: 100%;
      justify-content: center;
      padding: 14px;
      border-radius: 10px;
      background: #0056b3;
      color: #fff;
      font-weight: 700;
    }

    .login-error {
      min-height: 20px;
      margin-bottom: 10px;
      color: #dc2626;
      font-size: 0.9rem;
      text-align: center;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.15;
      mix-blend-mode: screen;
      animation: float 25s infinite alternate;
    }

    .orb-1 {
      top: 10%;
      left: 15%;
      width: 350px;
      height: 350px;
      background: var(--primary);
    }

    .orb-2 {
      top: 50%;
      right: 10%;
      width: 400px;
      height: 400px;
      background: var(--accent);
      animation-delay: -5s;
    }

    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(60px, 40px) scale(1.1); }
    }

    .pes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 25px;
      padding: 20px 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      background: linear-gradient(135deg, #003b7a, #0056b3);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    [data-theme="dark"] .pes-header {
      border-color: rgba(255, 255, 255, 0.05);
      background: linear-gradient(135deg, #031530 0%, #002d5a 100%);
    }

    .pes-brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .pes-logo,
    .pes-logo-fallback {
      width: 72px;
      height: 72px;
      flex: 0 0 72px;
      border-radius: 14px;
    }

    .pes-logo {
      padding: 6px;
      object-fit: contain;
      background: #fff;
      border: 1px solid rgba(0, 59, 122, 0.1);
    }

    .pes-logo-fallback {
      display: none;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      font-family: "Outfit", sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
    }

    .pes-header h1 {
      color: #fff;
      font-family: "Outfit", sans-serif;
      font-size: 2.2rem;
      line-height: 1;
    }

    .subtitle {
      margin-top: 4px;
      color: #dbeafe;
      font-size: 0.95rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 180px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .user-pill span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-btn,
    .theme-toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      border: 1px solid var(--card-border);
      border-radius: 50%;
      background: var(--card-bg);
      color: var(--text-primary);
      box-shadow: var(--card-shadow);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .icon-btn:hover,
    .theme-toggle-btn:hover {
      border-color: var(--primary);
      transform: scale(1.06);
    }

    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-widget,
    .top-bar-card,
    .editor-card,
    .note,
    .empty-state,
    .shimmer-card {
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .stat-widget {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px;
      border-radius: var(--border-radius-md);
    }

    .stat-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
    }

    .stat-icon.blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .stat-icon.purple { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }
    .stat-icon.pink { background: rgba(236, 72, 153, 0.15); color: #ec4899; }
    .stat-icon.green { background: rgba(16, 185, 129, 0.15); color: #10b981; }

    .stat-info h3 {
      color: var(--text-primary);
      font-family: "Outfit", sans-serif;
      font-size: 1.4rem;
    }

    .stat-info p {
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .top-bar-card {
      margin-bottom: 25px;
      padding: 16px;
      border-radius: var(--border-radius-md);
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
      align-items: center;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-wrapper svg {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
    }

    .top-bar input,
    textarea {
      width: 100%;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.15);
      color: var(--text-primary);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .top-bar input {
      padding: 14px 16px 14px 44px;
    }

    .top-bar input:focus,
    textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    .toolbar-actions,
    .editor-actions,
    .note-card-actions,
    .note-actions-quick {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .filter-btn,
    .layout-btn,
    .primary,
    .secondary,
    .danger-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .filter-btn,
    .layout-btn,
    .secondary {
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }

    .filter-btn.active,
    .layout-btn.active,
    .primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: #fff;
    }

    .danger-outline {
      border: 1px solid rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.08);
      color: #ef4444;
    }

    .filter-btn:hover,
    .layout-btn:hover,
    .secondary:hover,
    .primary:hover,
    .danger-outline:hover {
      transform: translateY(-1px);
    }

    .danger-outline:hover {
      background: #ef4444;
      color: #fff;
    }

    .tag-cloud {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--card-border);
    }

    .tag-cloud-title {
      display: flex;
      align-items: center;
      gap: 5px;
      width: 100%;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border: 1px solid var(--card-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .filter-tag.active {
      border-color: transparent;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
    }

    .editor-card {
      position: relative;
      margin-bottom: 25px;
      padding: 24px;
      overflow: hidden;
      border-radius: var(--border-radius-lg);
    }

    .editor-card::before {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--primary), var(--accent));
      content: "";
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .editor-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      font-family: "Outfit", sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
    }

    textarea {
      min-height: 120px;
      margin-bottom: 16px;
      padding: 16px;
      resize: vertical;
      line-height: 1.6;
    }

    .dropzone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 20px;
      border: 2px dashed var(--card-border);
      border-radius: var(--border-radius-md);
      background: rgba(0, 0, 0, 0.1);
      color: var(--text-muted);
      text-align: center;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .dropzone.dragover,
    .dropzone:hover {
      border-color: var(--primary);
      background: rgba(0, 119, 242, 0.06);
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .preview {
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      padding: 12px 16px;
      border: 1px solid var(--card-border);
      border-radius: var(--border-radius-md);
      background: rgba(0, 0, 0, 0.2);
    }

    .preview img,
    .file-icon-badge {
      width: 58px;
      height: 58px;
      border-radius: 10px;
    }

    .preview img {
      object-fit: cover;
    }

    .file-icon-badge {
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      color: var(--primary);
    }

    .preview-info {
      min-width: 0;
      flex: 1;
    }

    .preview-info p {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-info .name {
      color: var(--text-primary);
      font-weight: 700;
    }

    .preview-info .size {
      margin-top: 2px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .clear-file-btn,
    .quick-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
    }

    .clear-file-btn {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .editor-actions {
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .notes-grid {
      display: grid;
      gap: 20px;
    }

    .notes-grid.grid-view {
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .notes-grid.list-view {
      grid-template-columns: 1fr;
    }

    .note {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 20px;
      overflow: hidden;
      border-radius: var(--border-radius-md);
    }

    .note.pinned {
      border-left: 4px solid var(--warning);
    }

    .note.starred {
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.08), var(--card-shadow);
    }

    .note-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .note-date,
    .note-author {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .note-author {
      margin-bottom: 10px;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .quick-action-btn.active-pin,
    .quick-action-btn.active-star {
      color: var(--warning);
    }

    .note-content {
      flex: 1;
      margin-bottom: 14px;
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .note-content p,
    .note-content ul,
    .note-content ol,
    .note-content pre {
      margin-bottom: 8px;
    }

    .note-content ul,
    .note-content ol {
      margin-left: 20px;
    }

    .note-content code {
      padding: 2px 5px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.85em;
    }

    .note-content pre {
      overflow-x: auto;
      padding: 10px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .note-tag-highlight {
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(0, 119, 242, 0.16);
      color: var(--primary);
      font-weight: 700;
    }

    mark {
      padding: 0 2px;
      border-radius: 2px;
      background: rgba(245, 158, 11, 0.35);
      color: #fff;
    }

    .note-attachment {
      margin-top: auto;
      margin-bottom: 14px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      border-radius: 12px;
    }

    .attachment-img-wrapper {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.12);
      cursor: zoom-in;
    }

    .attachment-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .attachment-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .attachment-img-wrapper:hover .attachment-overlay {
      opacity: 1;
    }

    .doc-attachment-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      color: var(--text-primary);
      text-decoration: none;
      background: rgba(0, 0, 0, 0.15);
    }

    .doc-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(0, 119, 242, 0.14);
      color: var(--primary);
    }

    .doc-info {
      min-width: 0;
      flex: 1;
    }

    .doc-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .doc-subtitle {
      margin-top: 2px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--card-border);
    }

    .note-card-actions button {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 50px 20px;
      border-style: dashed;
      border-radius: var(--border-radius-md);
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state h3 {
      color: var(--text-primary);
      font-family: "Outfit", sans-serif;
    }

    .shimmer-card {
      min-height: 200px;
      padding: 20px;
      border-radius: var(--border-radius-md);
    }

    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 280px;
      max-width: 400px;
      padding: 14px 20px;
      border: 1px solid var(--card-border);
      border-left: 4px solid var(--primary);
      border-radius: 16px;
      background: rgba(20, 26, 42, 0.95);
      color: #fff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      opacity: 0;
      pointer-events: auto;
      transform: translateX(120%);
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(0);
    }

    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warning { border-left-color: var(--warning); }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(5, 7, 12, 0.95);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.show {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 90%;
      max-height: 85%;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 12px;
      object-fit: contain;
    }

    .lightbox-caption {
      margin-top: 15px;
      color: #fff;
      font-weight: 600;
      text-align: center;
    }

    .lightbox-close-btn {
      position: absolute;
      top: -45px;
      right: 0;

  <script>
    const SUPABASE_URL = "https://kuengnoohosovnnibqlb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_y4XzOOhE84fof3YZK4qz-w_KSCMXLlz";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const state = {
      notes: [],
      currentFilterTag: null,
      starredOnly: false,
      viewMode: "grid",
      editingNoteId: null,
      editingFileUrl: null,
      loggedInUser: localStorage.getItem("chartbox_username") || ""
    };


  let editingNoteId = null;
let allNotes = [];

const ADMIN_USERS = [
  "Harsha",
  "harshavardhan",
  "harsha",
  "Harshavardhan",
  "apoorva",
  "Apoorva"
];
    
    const els = {
      appPage: document.getElementById("appPage"),
      loginOverlay: document.getElementById("loginOverlay"),
      loginForm: document.getElementById("loginForm"),
      loginUsername: document.getElementById("loginUsername"),
      loginPassword: document.getElementById("loginPassword"),
      loginError: document.getElementById("loginError"),
      loggedInUserLabel: document.getElementById("loggedInUserLabel"),
      logoutBtn: document.getElementById("logoutBtn"),
      pesLogoImg: document.getElementById("pesLogoImg"),
      pesLogoFallback: document.getElementById("pesLogoFallback"),
      themeToggleBtn: document.getElementById("themeToggleBtn"),
      sunIcon: document.querySelector(".sun-icon"),
      moonIcon: document.querySelector(".moon-icon"),
      noteInput: document.getElementById("noteInput"),
      imageInput: document.getElementById("imageInput"),
      dropZone: document.getElementById("dropZone"),
      imagePreview: document.getElementById("imagePreview"),
      previewThumb: document.getElementById("previewThumb"),
      previewIconBadge: document.getElementById("previewIconBadge"),
      previewName: document.getElementById("previewName"),
      previewSize: document.getElementById("previewSize"),
      clearImageButton: document.getElementById("clearImageButton"),
      resetButton: document.getElementById("resetButton"),
      saveButton: document.getElementById("saveButton"),
      saveBtnText: document.getElementById("saveBtnText"),
      saveBtnIcon: document.getElementById("saveBtnIcon"),
      editorCard: document.getElementById("editorCard"),
      editorTitleText: document.getElementById("editorTitleText"),
      searchInput: document.getElementById("searchInput"),
      starredFilterBtn: document.getElementById("starredFilterBtn"),
      layoutGridBtn: document.getElementById("layoutGridBtn"),
      layoutListBtn: document.getElementById("layoutListBtn"),
      tagCloudContainer: document.getElementById("tagCloudContainer"),
      notesList: document.getElementById("notesList"),
      statTotalNotes: document.getElementById("statTotalNotes"),
      statPinnedNotes: document.getElementById("statPinnedNotes"),
      statStarredNotes: document.getElementById("statStarredNotes"),
      statTotalFiles: document.getElementById("statTotalFiles"),
      lightbox: document.getElementById("lightbox"),
      lightboxImg: document.getElementById("lightboxImg"),
      lightboxCaption: document.getElementById("lightboxCaption"),
      lightboxCloseBtn: document.getElementById("lightboxCloseBtn")
    };

    marked.setOptions({ breaks: true, gfm: true });

    function init() {
      initTheme();
      bindEvents();
      refreshIcons();

      if (state.loggedInUser) {
        showApp();
      } else {
        showLogin();
      }
    }

    function bindEvents() {
      els.loginForm.addEventListener("submit", studentLogin);
      els.logoutBtn.addEventListener("click", logout);

      els.pesLogoImg.addEventListener("error", () => {
        els.pesLogoImg.style.display = "none";
        els.pesLogoFallback.style.display = "flex";
      });

      els.themeToggleBtn.addEventListener("click", toggleTheme);
      els.saveButton.addEventListener("click", saveNote);
      els.resetButton.addEventListener("click", resetForm);
      els.clearImageButton.addEventListener("click", clearSelectedFile);

      els.searchInput.addEventListener("input", renderNotesFeed);
      els.starredFilterBtn.addEventListener("click", () => {
        state.starredOnly = !state.starredOnly;
        els.starredFilterBtn.classList.toggle("active", state.starredOnly);
        renderNotesFeed();
      });

      els.layoutGridBtn.addEventListener("click", () => setViewMode("grid"));
      els.layoutListBtn.addEventListener("click", () => setViewMode("list"));

      els.dropZone.addEventListener("dragover", (event) => {
        event.preventDefault();
        els.dropZone.classList.add("dragover");
      });

      els.dropZone.addEventListener("dragleave", () => {
        els.dropZone.classList.remove("dragover");
      });

      els.dropZone.addEventListener("drop", (event) => {
        event.preventDefault();
        els.dropZone.classList.remove("dragover");
        const file = event.dataTransfer.files[0];
        if (!file) return;
        els.imageInput.files = event.dataTransfer.files;
        handleFileSelection(file);
      });

      els.imageInput.addEventListener("change", (event) => {
        const file = event.target.files[0];
        if (file) handleFileSelection(file);
      });

      els.lightbox.addEventListener("click", closeLightbox);
      els.lightboxCloseBtn.addEventListener("click", closeLightbox);
      els.lightboxImg.parentElement.addEventListener("click", (event) => event.stopPropagation());

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeLightbox();
      });
    }

  async function studentLogin(event) {
  event.preventDefault();

  const srn = els.loginUsername.value.trim();
  const password = els.loginPassword.value.trim();

  els.loginError.textContent = "";

  if (!srn || !password) {
    els.loginError.textContent = "Enter SRN and password";
    return;
  }

  const btn = document.getElementById("loginSubmitBtn");
  btn.disabled = true;
  btn.innerText = "Logging in...";

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        srn,
        password
      })
    });

    const data = await res.json();

    if (!res.ok) {
      els.loginError.textContent =
        data.error || "Login failed";
      return;
    }

    state.loggedInUser = data.name || srn;

    localStorage.setItem(
      "chartbox_username",
      data.name || srn
    );

    els.loggedInUserLabel.textContent =
      data.name || srn;

    showApp();

    showToast(
      `Welcome ${data.name || srn}`,
      "success"
    );

  } catch (err) {
    console.error(err);
    els.loginError.textContent =
      "Server error. Please try again.";
  } finally {
    btn.disabled = false;
    btn.innerText = "Login";
  }
}

    
    function showLogin() {
      els.loginOverlay.style.display = "flex";
      els.appPage.style.display = "none";
      setTimeout(() => els.loginUsername.focus(), 50);
    }

    function showApp() {
      els.loggedInUserLabel.textContent = state.loggedInUser;
      els.loginOverlay.style.display = "none";
      els.appPage.style.display = "block";
      loadNotes();
    }

    function logout() {
      localStorage.removeItem("chartbox_username");
      state.loggedInUser = "";
      state.notes = [];
      resetForm();
      els.notesList.innerHTML = "";
      els.loginUsername.value = "";
      els.loginPassword.value = "";
      showLogin();
      showToast("Logged out successfully.", "info");
    }

    function initTheme() {
      setTheme(localStorage.getItem("chartbox_theme") || "dark");
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("chartbox_theme", theme);
      els.sunIcon.style.display = theme === "dark" ? "block" : "none";
      els.moonIcon.style.display = theme === "light" ? "block" : "none";
      refreshIcons();
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      const nextTheme = currentTheme === "light" ? "dark" : "light";
      setTheme(nextTheme);
      showToast("Switched to " + nextTheme + " mode.", "info");
    }

    function showToast(message, type = "success") {
      const toast = document.createElement("div");
      toast.className = "toast " + type;

      let icon = "check-circle";
      if (type === "error") icon = "alert-circle";
      if (type === "warning") icon = "alert-triangle";
      if (type === "info") icon = "info";

      toast.innerHTML = `
        <i data-lucide="${icon}"></i>
        <div>${escapeHTML(message)}</div>
      `;

      document.getElementById("toastContainer").appendChild(toast);
      refreshIcons();
      setTimeout(() => toast.classList.add("show"), 50);
      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 400);
      }, 3500);
    }

    function handleFileSelection(file) {
      if (file.size > 15 * 1024 * 1024) {
        showToast("File size too large. Limit is 15MB.", "warning");
        clearSelectedFile(false);
        return;
      }

      els.imagePreview.style.display = "flex";
      els.previewName.textContent = file.name;
      els.previewSize.textContent = formatBytes(file.size);

      if (file.type.startsWith("image/")) {
        els.previewThumb.src = URL.createObjectURL(file);
        els.previewThumb.style.display = "block";
        els.previewIconBadge.style.display = "none";
      } else {
        els.previewThumb.style.display = "none";
        els.previewIconBadge.style.display = "flex";
        els.previewIconBadge.innerHTML = `<i data-lucide="${getFileIcon(file.name)}" width="24" height="24"></i>`;
        refreshIcons();
      }
    }

    function clearSelectedFile(showMessage = true) {
      els.imageInput.value = "";
      state.editingFileUrl = null;
      resetPreview();
      if (showMessage) showToast("Attachment cleared.", "info");
    }

    function resetPreview() {
      if (els.previewThumb.src.startsWith("blob:")) URL.revokeObjectURL(els.previewThumb.src);
      els.imagePreview.style.display = "none";
      els.previewName.textContent = "";
      els.previewSize.textContent = "";
      els.previewThumb.removeAttribute("src");
      els.previewThumb.style.display = "none";
      els.previewIconBadge.style.display = "none";
    }

    function resetForm() {
      els.noteInput.value = "";
      els.imageInput.value = "";
      state.editingNoteId = null;
      state.editingFileUrl = null;
      resetPreview();
      els.editorCard.style.borderColor = "var(--card-border)";
      els.editorTitleText.innerHTML = `<i data-lucide="pencil-line" width="18" height="18"></i> Compose a New Note`;
      els.saveBtnText.textContent = "Publish Note";
      els.saveBtnIcon.setAttribute("data-lucide", "send");
      refreshIcons();
    }

    async function saveNote() {
      if (!state.loggedInUser) {
        showToast("Please login first.", "warning");
        showLogin();
        return;
      }

      const text = els.noteInput.value.trim();
      const file = els.imageInput.files[0];
      let fileUrl = state.editingFileUrl;

      if (!text && !file && !fileUrl) {
        showToast("Please write a note or attach a file first.", "warning");
        return;
      }

      els.saveButton.disabled = true;
      els.saveBtnText.textContent = state.editingNoteId ? "Updating..." : "Publishing...";

      try {
        if (file) {
          const fileName = Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9.\-]/g, "_");
          const { error: uploadError } = await db.storage.from("note-images").upload(fileName, file);
          if (uploadError) throw uploadError;

          const { data } = db.storage.from("note-images").getPublicUrl(fileName);
          fileUrl = data.publicUrl;
        }

        if (state.editingNoteId) {
          const { error } = await db
            .from("notes")
            .update({ content: text, image_url: fileUrl, username: state.loggedInUser })
            .eq("id", state.editingNoteId);

          if (error) throw error;
          showToast("Note updated successfully.");
        } else {
          const { error } = await db
            .from("notes")
            .insert([{ content: text, image_url: fileUrl, username: state.loggedInUser }]);

          if (error) throw error;
          showToast("Note published successfully.");
        }

        resetForm();
        await loadNotes();
      } catch (error) {
        showToast("Save failed: " + error.message, "error");
        console.error(error);
      } finally {
        els.saveButton.disabled = false;
        els.saveBtnText.textContent = state.editingNoteId ? "Update Note" : "Publish Note";
      }
    }

    async function loadNotes() {
      if (!state.loggedInUser) return;

      renderShimmerLoaders();

      const { data, error } = await db
        .from("notes")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        showToast("Error loading notes: " + error.message, "error");
        els.notesList.innerHTML = `
          <div class="empty-state">
            <i data-lucide="cloud-off" width="48" height="48"></i>
            <h3>Connection Error</h3>
            <p>Could not reach the database. Please verify your Supabase table permissions and network connection.</p>
          </div>
        `;
        refreshIcons();
        return;
      }

      state.notes = data || [];
      renderNotesFeed();
    }

    function renderShimmerLoaders() {
      els.notesList.innerHTML = Array.from({ length: 3 }, () => `
        <div class="shimmer-card">
          <p style="height: 18px; width: 45%; border-radius: 6px; background: rgba(255,255,255,0.08);"></p>
          <p style="height: 14px; width: 90%; margin-top: 16px; border-radius: 6px; background: rgba(255,255,255,0.06);"></p>
          <p style="height: 14px; width: 70%; margin-top: 10px; border-radius: 6px; background: rgba(255,255,255,0.06);"></p>
        </div>
      `).join("");
    }

    function renderNotesFeed() {
      const searchTerm = els.searchInput.value.toLowerCase().trim();

      let notes = state.notes.map((note) => ({
        ...note,
        isPinned: localStorage.getItem("chartbox_pinned_" + note.id) === "true",
        isStarred: localStorage.getItem("chartbox_starred_" + note.id) === "true",
        tags: extractHashtags(note.content)
      }));

      if (searchTerm) {
        notes = notes.filter((note) => {
          const contentMatch = (note.content || "").toLowerCase().includes(searchTerm);
          const tagMatch = note.tags.some((tag) => tag.includes(searchTerm.replace("#", "")));
          const userMatch = (note.username || "").toLowerCase().includes(searchTerm);
          return contentMatch || tagMatch || userMatch;
        });
      }

      if (state.starredOnly) notes = notes.filter((note) => note.isStarred);
      if (state.currentFilterTag) notes = notes.filter((note) => note.tags.includes(state.currentFilterTag));

      notes.sort((a, b) => {
        if (a.isPinned && !b.isPinned) return -1;
        if (!a.isPinned && b.isPinned) return 1;
        return new Date(b.created_at || 0) - new Date(a.created_at || 0);
      });

      updateStatsWidget();
      updateTagCloud();

      if (!notes.length) {
        const hasFilters = searchTerm || state.currentFilterTag || state.starredOnly;
        els.notesList.innerHTML = `
          <div class="empty-state">
            <i data-lucide="notepad-text" width="56" height="56"></i>
            <h3>No Notes Found</h3>
            <p>${hasFilters ? "No notes match the selected filters." : "Compose your first note above to begin."}</p>
            ${hasFilters ? `<button type="button" class="secondary" onclick="clearFilters()">Clear Filters</button>` : ""}
          </div>
        `;
        refreshIcons();
        return;
      }

      els.notesList.innerHTML = notes.map(renderNoteCard).join("");
      refreshIcons();
    }

    function renderNoteCard(note) {
      
      const dateStr = note.created_at
        ? new Date(note.created_at).toLocaleDateString(undefined, {
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          })
        : "Draft Note";

      const parsedContent = parseNoteContent(note.content || "");
      const attachmentHtml = renderAttachment(note);
      const username = escapeHTML(note.username || "Unknown student");

      return `
        <article class="note ${note.isPinned ? "pinned" : ""} ${note.isStarred ? "starred" : ""}">
          <div class="note-header">
            <span class="note-date">
              <i data-lucide="clock" width="12" height="12"></i>
              ${dateStr}
            </span>
            <div class="note-actions-quick">
              <button type="button" class="quick-action-btn ${note.isPinned ? "active-pin" : ""}" onclick="togglePin(${note.id})" title="${note.isPinned ? "Unpin note" : "Pin note"}">
                <i data-lucide="pin" width="14" height="14"></i>
              </button>
              <button type="button" class="quick-action-btn ${note.isStarred ? "active-star" : ""}" onclick="toggleStar(${note.id})" title="${note.isStarred ? "Remove star" : "Star note"}">
                <i data-lucide="star" width="14" height="14"></i>
              </button>
            </div>
          </div>
          <div class="note-author">
            <i data-lucide="user-round" width="13" height="13"></i>
            Posted by ${username}
          </div>
          <div class="note-content">${parsedContent}</div>
          ${attachmentHtml}


          <div class="note-footer">
  <div class="note-card-actions">

    <button type="button" class="secondary" onclick="startEditNote(${note.id})">
      <i data-lucide="edit-3" width="12" height="12"></i>
      <span>Edit</span>
    </button>

    ${
      ADMIN_USERS.includes(state.loggedInUser)
        ? `
          <button type="button" class="danger-outline" onclick="deleteNote(${note.id})">
            <i data-lucide="trash" width="12" height="12"></i>
            <span>Delete</span>
          </button>
        `
        : ""
    }

  </div>

  <button type="button" class="quick-action-btn" onclick="copyNoteText(${note.id})">
    <i data-lucide="copy" width="13" height="13"></i>
  </button>
</div>
        </article>
      `;
    }

    function renderAttachment(note) {
      if (!note.image_url) return "";
      const ADMIN_USERNAME = "Harsha"; // change to your username

      const fileUrl = escapeAttribute(note.image_url);
      const displayName = getDisplayFileName(note.image_url);
      const escapedName = escapeHTML(displayName);
      const isImage = /\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(note.image_url);

      if (isImage) {
        return `
          <div class="note-attachment">
            <div class="attachment-img-wrapper" data-url="${fileUrl}" data-caption="${escapeAttribute(note.content || displayName)}" onclick="openLightboxFromButton(this)">
              <img src="${fileUrl}" alt="Attachment: ${escapedName}" loading="lazy" />
              <div class="attachment-overlay"><i data-lucide="zoom-in"></i></div>
            </div>
          </div>
        `;
      }

      const icon = getFileIcon(note.image_url);
      const label = getFileLabel(note.image_url);

      return `
        <div class="note-attachment">
          <a href="${fileUrl}" target="_blank" rel="noopener noreferrer" class="doc-attachment-card">
            <div class="doc-icon"><i data-lucide="${icon}"></i></div>
            <div class="doc-info">
              <div class="doc-title">${escapedName}</div>
              <div class="doc-subtitle">${label}</div>
            </div>
            <i data-lucide="external-link" width="16" height="16"></i>
          </a>
        </div>
      `;
    }

    function parseNoteContent(text) {
      const escapedMarkdown = escapeHTML(text);
      let html = marked.parse(escapedMarkdown);
      const searchTerm = els.searchInput.value.trim();
      if (searchTerm) html = highlightSearch(html, searchTerm);
      return html.replace(/#([a-zA-Z0-9_-]+)/g, (match, tag) => {
        const safeTag = escapeAttribute(tag.toLowerCase());
        return `<button type="button" class="note-tag-highlight" onclick="toggleTagFilter('${safeTag}')">#${escapeHTML(tag)}</button>`;
      });
    }

    function startEditNote(id) {
      const note = state.notes.find((item) => item.id === id);
      if (!note) return;

      state.editingNoteId = id;
      state.editingFileUrl = note.image_url || null;
      els.noteInput.value = note.content || "";

      resetPreview();

      if (note.image_url) {
        els.imagePreview.style.display = "flex";
        els.previewName.textContent = getDisplayFileName(note.image_url);
        els.previewSize.textContent = "Existing attachment";

        if (/\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(note.image_url)) {
          els.previewThumb.src = note.image_url;
          els.previewThumb.style.display = "block";
          els.previewIconBadge.style.display = "none";
        } else {
          els.previewThumb.style.display = "none";
          els.previewIconBadge.style.display = "flex";
          els.previewIconBadge.innerHTML = `<i data-lucide="${getFileIcon(note.image_url)}" width="24" height="24"></i>`;
        }
      }

      els.editorCard.style.borderColor = "var(--primary)";
      els.editorTitleText.innerHTML = `<i data-lucide="edit" width="18" height="18"></i> Editing Note`;
      els.saveBtnText.textContent = "Update Note";
      els.saveBtnIcon.setAttribute("data-lucide", "check");
      els.noteInput.focus();
      els.editorCard.scrollIntoView({ behavior: "smooth", block: "center" });
      refreshIcons();
    }

    async function deleteNote(id) {
  if (!ADMIN_USERS.includes(state.loggedInUser)) {
    showToast("Only admin can delete notes.", "warning");
    return;
  }

  if (!confirm("Are you sure you want to permanently delete this note?")) return;

  try {
    const { error } = await db
      .from("notes")
      .delete()
      .eq("id", id);

    if (error) throw error;

    localStorage.removeItem("chartbox_pinned_" + id);
    localStorage.removeItem("chartbox_starred_" + id);

    showToast("Note deleted successfully.", "success");

    await loadNotes();
  } catch (error) {
    showToast("Could not delete note: " + error.message, "error");
  }
}

    function togglePin(id) {
      const key = "chartbox_pinned_" + id;
      const nextValue = localStorage.getItem(key) !== "true";
      localStorage.setItem(key, String(nextValue));
      showToast(nextValue ? "Note pinned to top." : "Note unpinned.", "info");
      renderNotesFeed();
    }

    function toggleStar(id) {
      const key = "chartbox_starred_" + id;
      const nextValue = localStorage.getItem(key) !== "true";
      localStorage.setItem(key, String(nextValue));
      showToast(nextValue ? "Added to favorites." : "Removed from favorites.", "info");
      renderNotesFeed();
    }

    function copyNoteText(id) {
      const note = state.notes.find((item) => item.id === id);
      if (!note) return;

      navigator.clipboard.writeText(note.content || "")
        .then(() => showToast("Note copied to clipboard."))
        .catch(() => showToast("Copy failed.", "error"));
    }

    function updateStatsWidget() {
      const total = state.notes.length;
      const pinned = state.notes.filter((note) => localStorage.getItem("chartbox_pinned_" + note.id) === "true").length;
      const starred = state.notes.filter((note) => localStorage.getItem("chartbox_starred_" + note.id) === "true").length;
      const files = state.notes.filter((note) => note.image_url).length;

      els.statTotalNotes.textContent = total;
      els.statPinnedNotes.textContent = pinned;
      els.statStarredNotes.textContent = starred;
      els.statTotalFiles.textContent = files;
    }

    function updateTagCloud() {
      const tagCounts = {};
      state.notes.forEach((note) => {
        extractHashtags(note.content).forEach((tag) => {
          tagCounts[tag] = (tagCounts[tag] || 0) + 1;
        });
      });

      const tags = Object.keys(tagCounts).sort();
      if (!tags.length) {
        els.tagCloudContainer.style.display = "none";
        els.tagCloudContainer.innerHTML = "";
        return;
      }

      els.tagCloudContainer.style.display = "flex";
      els.tagCloudContainer.innerHTML = `
        <span class="tag-cloud-title">
          <i data-lucide="tag" width="12" height="12"></i>
          Filter by hashtag
        </span>
        ${tags.map((tag) => `
          <button type="button" class="filter-tag ${state.currentFilterTag === tag ? "active" : ""}" onclick="toggleTagFilter('${escapeAttribute(tag)}')">
            #${escapeHTML(tag)} <span>(${tagCounts[tag]})</span>
          </button>
        `).join("")}
      `;

      refreshIcons();
    }

    function toggleTagFilter(tag) {
      state.currentFilterTag = state.currentFilterTag === tag ? null : tag;
      renderNotesFeed();
    }

    function clearFilters() {
      els.searchInput.value = "";
      state.currentFilterTag = null;
      state.starredOnly = false;
      els.starredFilterBtn.classList.remove("active");
      renderNotesFeed();
      showToast("Filters cleared.", "info");
    }

    function setViewMode(mode) {
      state.viewMode = mode;
      els.layoutGridBtn.classList.toggle("active", mode === "grid");
      els.layoutListBtn.classList.toggle("active", mode === "list");
      els.notesList.className = "notes-grid " + (mode === "grid" ? "grid-view" : "list-view");
    }

    function openLightbox(url, caption) {
      els.lightboxImg.src = url;
      els.lightboxCaption.textContent = caption || "Media view";
      els.lightbox.classList.add("show");
    }

    function openLightboxFromButton(button) {
      openLightbox(button.dataset.url, button.dataset.caption);
    }

    function closeLightbox() {
      els.lightbox.classList.remove("show");
      els.lightboxImg.removeAttribute("src");
    }

    function extractHashtags(text = "") {
      const tags = [];
      const regex = /#([a-zA-Z0-9_-]+)/g;
      let match;
      while ((match = regex.exec(text)) !== null) tags.push(match[1].toLowerCase());
      return [...new Set(tags)];
    }

    function highlightSearch(text, query) {
      if (!query) return text;
      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return text.replace(new RegExp("(" + escapedQuery + ")", "gi"), "<mark>$1</mark>");
    }

    function formatBytes(bytes, decimals = 2) {
      if (!bytes) return "0 Bytes";
      const k = 1024;
      const sizes = ["Bytes", "KB", "MB", "GB"];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(decimals)) + " " + sizes[i];
    }

    function getDisplayFileName(url) {
      const raw = decodeURIComponent(url.split("/").pop() || "Attachment");
      const dashIndex = raw.indexOf("-");
      return dashIndex >= 0 ? raw.slice(dashIndex + 1) : raw;
    }

    function getFileIcon(name = "") {
      if (/\.pdf(\?.*)?$/i.test(name)) return "file-text";
      if (/\.(ppt|pptx)(\?.*)?$/i.test(name)) return "presentation";
      if (/\.(doc|docx)(\?.*)?$/i.test(name)) return "file-text";
      return "file";
    }

    function getFileLabel(name = "") {
      if (/\.pdf(\?.*)?$/i.test(name)) return "PDF document";
      if (/\.(ppt|pptx)(\?.*)?$/i.test(name)) return "Presentation";
      if (/\.(doc|docx)(\?.*)?$/i.test(name)) return "Word document";
      if (/\.txt(\?.*)?$/i.test(name)) return "Text document";
      return "Document attachment";
    }

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHTML(value).replace(/`/g, "&#096;");
    }

    function refreshIcons() {
      if (window.lucide) lucide.createIcons();
    }

    window.startEditNote = startEditNote;
    window.deleteNote = deleteNote;
    window.togglePin = togglePin;
    window.toggleStar = toggleStar;
    window.copyNoteText = copyNoteText;
    window.toggleTagFilter = toggleTagFilter;
    window.clearFilters = clearFilters;
    window.openLightbox = openLightbox;
    window.openLightboxFromButton = openLightboxFromButton;

    init();
  </script>
</body>
</html>
